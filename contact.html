<head>

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:Arial,sans-serif;
}

html{
  scroll-behavior:smooth;
}

body{
  background:#0f172a;
  color:white;
  overflow-x:hidden;
}

header{
  position:sticky;
  top:0;
  z-index:1000;
  background:#111827;
  border-bottom:1px solid rgba(255,255,255,0.1);
}

.navbar{
  max-width:1200px;
  margin:auto;
  padding:18px 20px;
  display:flex;
  justify-content:space-between;
  align-items:center;
  flex-wrap:wrap;
  gap:20px;
}

.logo{
  font-size:30px;
  font-weight:bold;
  background:linear-gradient(to right,#38bdf8,#8b5cf6);
  -webkit-background-clip:text;
  background-clip:text;
  -webkit-text-fill-color:transparent;
}

.nav-links{
  display:flex;
  gap:20px;
  flex-wrap:wrap;
}

.nav-links a{
  color:#cbd5e1;
  text-decoration:none;
  transition:0.3s;
}

.nav-links a:hover{
  color:#38bdf8;
}

main{
  max-width:850px;
  margin:auto;
  padding:80px 20px;
}

h1{
  font-size:48px;
  line-height:1.2;
  margin-bottom:20px;
  text-align:center;
  background:linear-gradient(to right,#06b6d4,#8b5cf6);
  -webkit-background-clip:text;
  background-clip:text;
  -webkit-text-fill-color:transparent;
}

p{
  color:#cbd5e1;
  font-size:18px;
  line-height:1.8;
  margin-bottom:20px;
  text-align:center;
}

a{
  color:#38bdf8;
  text-decoration:none;
}

a:hover{
  text-decoration:underline;
}

.card{
  background:#1e293b;
  padding:30px;
  border-radius:20px;
  text-align:center;
  margin-top:20px;
}

.back-link{
  display:block;
  text-align:center;
  margin-top:40px;
}

footer{
  background:#111827;
  padding:40px 20px;
  margin-top:60px;
  text-align:center;
  color:#94a3b8;
}

footer nav a{
  color:#94a3b8;
  margin:0 6px;
}

footer nav a:hover{
  color:#38bdf8;
}

@media(max-width:768px){
  h1{
    font-size:34px;
  }
}
</style>
</head>
<body>

<header>
  <div class="navbar">
    <div class="logo">BarcodePro</div>
    <div class="nav-links">

      <a href="faq.html">FAQ</a>
      <a href="contact.html">Contact</a>
    </div>
  </div>
</header>

<main>

<h1>Contact</h1>

<p>Questions or suggestions?</p>

<div class="card">
  <p>
    Email:
    <a href="dkonhack@gmail.com">dkonhack@gmail.com</a>
  </p>
  <p>We usually reply within 48 hours.</p>
</div>

</html>
